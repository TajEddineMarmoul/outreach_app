name: Deploy GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: mailsender-501713
  REGION: us-central1
  BACKEND_SERVICE: outreach-backend
  FRONTEND_SERVICE: outreach-frontend
  BACKEND_IMAGE: gcr.io/mailsender-501713/outreach-backend
  FRONTEND_IMAGE: gcr.io/mailsender-501713/outreach-frontend
  WORKER_SCHEDULER_JOB: outreach-worker-tick

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy API
        run: |
          build_id=$(gcloud builds submit . \
            --project="$PROJECT_ID" \
            --tag="$BACKEND_IMAGE:${GITHUB_SHA}" \
            --async \
            --format='value(id)')
          for attempt in {1..60}; do
            status=$(gcloud builds describe "$build_id" --project="$PROJECT_ID" --format='value(status)')
            case "$status" in
              SUCCESS) break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR) echo "Cloud Build failed: $status"; exit 1 ;;
            esac
            sleep 10
          done
          test "$status" = SUCCESS
          gcloud run deploy "$BACKEND_SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --image="$BACKEND_IMAGE:${GITHUB_SHA}" \
            --quiet

      - name: Build and deploy frontend
        run: |
          build_id=$(gcloud builds submit outreach_web \
            --project="$PROJECT_ID" \
            --config=outreach_web/cloudbuild.yaml \
            --substitutions="_NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_URL }},_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }},_IMAGE=${FRONTEND_IMAGE}:${GITHUB_SHA}" \
            --async \
            --format='value(id)')
          for attempt in {1..60}; do
            status=$(gcloud builds describe "$build_id" --project="$PROJECT_ID" --format='value(status)')
            case "$status" in
              SUCCESS) break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR) echo "Cloud Build failed: $status"; exit 1 ;;
            esac
            sleep 10
          done
          test "$status" = SUCCESS
          gcloud run deploy "$FRONTEND_SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --image="$FRONTEND_IMAGE:${GITHUB_SHA}" \
            --port=8080 \
            --max=1 \
            --min=0 \
            --allow-unauthenticated \
            --update-env-vars="CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}" \
            --quiet

      - name: Update worker scheduler
        run: |
          gcloud scheduler jobs update http "$WORKER_SCHEDULER_JOB" \
            --project="$PROJECT_ID" \
            --location="$REGION" \
            --schedule='* * * * *' \
            --uri="${{ secrets.BACKEND_URL }}/internal/worker/tick" \
            --http-method=POST \
            --update-headers="X-Worker-Token=${{ secrets.WORKER_TICK_TOKEN }}" \
            --time-zone=UTC \
            --quiet
